<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Glassmorphism Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
        .calc-container { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); padding: 25px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); width: 100%; max-width: 340px; border: 1px solid rgba(255,255,255,0.05); }
        .display-screen { width: 100%; height: 90px; background: #0b0f19; border: none; outline: none; border-radius: 16px; margin-bottom: 24px; color: #38bdf8; font-size: 2.2rem; text-align: right; padding: 15px; font-weight: 600; letter-spacing: 1px; box-shadow: inset 0 4px 10px rgba(0,0,0,0.5); }
        .buttons-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
        button { padding: 20px; border: none; border-radius: 14px; background: #334155; color: #f8fafc; font-size: 1.3rem; font-weight: bold; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:hover { background: #475569; transform: translateY(-2px); }
        button:active { transform: translateY(1px); }
        button.operator { color: #38bdf8; background: #1e293b; }
        button.operator:hover { background: #334155; }
        button.clear { color: #f43f5e; background: rgba(244, 63, 94, 0.1); }
        button.clear:hover { background: #f43f5e; color: #fff; }
        button.equal { background: linear-gradient(135deg, #38bdf8, #0ea5e9); color: #0f172a; grid-column: span 2; }
        button.equal:hover { opacity: 0.9; box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
    </style>
</head>
<body>
    <div class="calc-container">
        <input type="text" id="display" readonly placeholder="0">
        <div class="buttons-grid">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="backspace()">DEL</button>
            <button class="operator" onclick="appendValue('/')">/</button>
            <button class="operator" onclick="appendValue('*')">×</button>
            
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('-')">-</button>
            
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('+')">+</button>
            
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('.')">.</button>
            
            <button onclick="appendValue('0')">0</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>
    </div>
    <script>
        const display = document.getElementById('display');
        function appendValue(val) { display.value += val; }
        function clearDisplay() { display.value = ''; }
        function backspace() { display.value = display.value.slice(0, -1); }
        function calculate() { 
            try { 
                if(display.value) {
                    display.value = Number(eval(display.value).toFixed(4)); 
                }
            } catch { 
                display.value = 'Error'; 
            } 
        }
    </script>
</body>
</html>
